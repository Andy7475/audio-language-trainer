<div class="card">
    <div class="picture-container">
      <div class="flip-container" id="imageFlip">
        <div class="flip-front">
          <button class="reveal-button">
            <svg class="reveal-icon" viewBox="0 0 24 24">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            Reveal Image
          </button>
        </div>
        <div class="flip-back">{{Picture}}</div>
      </div>
    </div>
  
    <div id="target-text-container" class="target-text" onclick="copyToClipboard(this)">
      <!-- Remove the hidden div and directly process TargetText -->
      {{TargetText}}
    </div>
  </div>
  
  <script>
    // Image flip functionality
    const flipContainer = document.querySelector('.flip-container');
    if (flipContainer) {
      flipContainer.addEventListener('click', function() {
        this.classList.toggle('flipped');
        const button = this.querySelector('.reveal-button');
        if (button) {
          button.innerHTML = `
            <svg class="reveal-icon" viewBox="0 0 24 24">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            ${this.classList.contains('flipped') ? 'Hide Image' : 'Reveal Image'}`;
        }
      });
    }
  
    // Copy text functionality
    function copyToClipboard(element) {
      const text = element.textContent;
      navigator.clipboard.writeText(text).then(() => {
        element.classList.add('copied');
        setTimeout(() => {
          element.classList.remove('copied');
        }, 1000);
      });
    }
  
    // Process text after a short delay to ensure content is loaded
    setTimeout(function() {
      const container = document.getElementById('target-text-container');
      if (!container) return;
      
      const text = container.textContent.trim();
      if (!text) return;
      
      // Split into words while preserving spaces and punctuation
      const words = text.split(/(\s+)/);
      
      // Filter for actual words (not spaces/punctuation)
      const actualWords = words.filter(word => /[a-zA-Z\u0080-\u024F]+/.test(word));
      
      if (actualWords.length > 0) {
        // Pick a random word
        const randomWord = actualWords[Math.floor(Math.random() * actualWords.length)];
        
        // Replace that word with a button
        const html = words.map(word => {
          if (word === randomWord) {
            return `<button onclick="this.classList.toggle('revealed')" 
                      class="hide-button">${word}</button>`;
          }
          return word;
        }).join('');
        
        container.innerHTML = html;
      }
    }, 100);
  </script>
